version: 2
updates:
  # GitHub Actions — weekly security check
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - iray-tno

  # Root (legacy Gatsby) — monthly version, weekly security
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      day: 1
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - iray-tno
    groups:
      gatsby:
        patterns:
          - "gatsby*"
      redux:
        patterns:
          - "redux"
          - "react-redux"
          - "@reduxjs/*"

  # Blog app — monthly version, weekly security
  - package-ecosystem: npm
    directory: "/apps/blog"
    schedule:
      interval: monthly
      day: 1
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - iray-tno
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      rehype-remark:
        patterns:
          - "rehype*"
          - "remark*"
          - "unified"
          - "hast*"
          - "mdast*"

  # Components package — monthly version, weekly security
  - package-ecosystem: npm
    directory: "/packages/components"
    schedule:
      interval: monthly
      day: 1
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - iray-tno
    groups:
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
